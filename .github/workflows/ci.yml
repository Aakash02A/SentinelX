name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint & Type Check ──────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff & mypy
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check --config .ruff-ci.toml backend/ agent/python/

      - name: Ruff format check (advisory)
        continue-on-error: true
        run: ruff format --config .ruff-ci.toml --check backend/ agent/python/

  # ── Backend Tests ──────────────────────────────────────────
  test-backend:
    name: Backend Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - telemetry
          - rule-engine
          - ml-engine
          - alert-engine
          - threat-intel
          - ai-analyst

    services:
      mysql:
        image: mysql:8.3
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sentinelx_test
          MYSQL_USER: sentinelx
          MYSQL_PASSWORD: sentinelx_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u sentinelx -psentinelx_secret"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared library
        run: pip install -e backend/shared/

      - name: Install service dependencies
        run: pip install -e backend/services/${{ matrix.service }}[dev]

      - name: Run tests
        env:
          DATABASE_URL: mysql+asyncmy://sentinelx:sentinelx_secret@localhost:3306/sentinelx_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-minimum-32-characters!
          APP_ENV: test
        run: |
          cd backend/services/${{ matrix.service }}
          pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  # ── Frontend Tests ─────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Run tests
        run: cd frontend && npm test -- --coverage

      - name: Build
        run: cd frontend && npm run build

  # ── Security Scanning ─────────────────────────────────────
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks — secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep — SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/fastapi
            p/owasp-top-ten
            p/jwt
            p/secrets

      - name: Trivy — dependency vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
